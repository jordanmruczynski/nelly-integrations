name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Zainstaluj zależności wszystkich integracji
        run: |
          python - <<'EOF'
          import json, pathlib, subprocess, sys
          reqs = {"httpx"}  # wspólny transport
          for m in pathlib.Path("integrations").glob("*/manifest.json"):
              reqs.update(json.loads(m.read_text())["requirements"] if json.loads(m.read_text()).get("requirements") else [])
          subprocess.run([sys.executable, "-m", "pip", "install", *sorted(reqs)], check=True)
          EOF
      - name: Walidacja każdej paczki
        run: |
          fail=0
          for d in integrations/*/; do
            echo "=== $d ==="
            python tools/validate.py "$d" || fail=1
          done
          exit $fail

  index:
    # Po merge'u do main przelicz index.json (sha256 + pin commita) i dopchnij.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Przebuduj index.json
        run: python tools/build_index.py --commit "$GITHUB_SHA"
      - name: Commit index.json (jeśli się zmienił)
        run: |
          git config user.name "nelly-ci"
          git config user.email "ci@users.noreply.github.com"
          git add index.json
          git diff --cached --quiet || git commit -m "ci: rebuild index.json [skip ci]"
          git push
